<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Telikom PNG | Engineers Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    background: linear-gradient(135deg,#0057b8,#00a2ff);
    min-height:100vh;
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.left img{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    padding:4px;
}

.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.icon-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    background:white;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#0057b8;
    font-weight:bold;
}

.logout{
    background:#d00000;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* DASHBOARD GRID */
.container{
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.25);
}

/* CHAT POPUP */
.chat-popup{
    position:fixed;
    bottom:90px;
    right:20px;
    width:320px;
    height:420px;
    background:white;
    color:black;
    border-radius:12px;
    display:none;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.chat-header{
    background:#0057b8;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.users{
    font-size:12px;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.chat-box{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.chat-input{
    display:flex;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    border-top:1px solid #ddd;
}

.chat-input button{
    padding:10px;
    background:#0057b8;
    color:white;
    border:none;
    cursor:pointer;
}

/* FOOTER SAME AS HEADER */
footer{
    margin-top:40px;
    padding:15px;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
    text-align:center;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("loggedIn") !== "true"){
    window.location.href="index.html";
}
</script>

<header>
    <div class="left">
        <img src="logotpng.jfif">
        <h3>Engineers Dashboard</h3>
    </div>

    <div class="right">

        <!-- LIVE CHAT ICON -->
        <div class="icon-btn" onclick="toggleChat()">💬</div>

        <button class="logout" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <h2>Network Systems</h2>

    <div class="grid">
        <div class="card">Projects</div>
        <div class="card">Network Health Audit</div>
        <div class="card">Refueling</div>
        <div class="card">Transmission</div>
        <div class="card">Radio Frequency</div>
        <div class="card">Base Station</div>
        <div class="card">NOC</div>
        <div class="card">Core Network</div>
        <div class="card">Infrastructure</div>
        <div class="card">Centers</div>
    </div>
</div>

<!-- CHAT POPUP -->
<div class="chat-popup" id="chatPopup">

    <div class="chat-header">
        <span>LiveWire Chat</span>
        <button onclick="toggleChat()">X</button>
    </div>

    <div class="users">
        🟢 Online: Engineer1, Engineer2<br>
        ⚪ Offline: Engineer3
    </div>

    <div class="chat-box" id="chatBox">
        <p><b>System:</b> Connected to LiveWire</p>
    </div>

    <div class="chat-input">
        <input id="msg" placeholder="Message...">
        <button onclick="send()">Send</button>
    </div>
</div>

<footer>
    Powered By: Iso Yawi | System Creator
</footer>

<script>

function logout(){
    sessionStorage.removeItem("loggedIn");
    window.location.href="index.html";
}

function toggleChat(){
    let chat=document.getElementById("chatPopup");
    chat.style.display = chat.style.display==="flex" ? "none":"flex";
}

function send(){
    let input=document.getElementById("msg");
    let box=document.getElementById("chatBox");

    if(input.value==="") return;

    let p=document.createElement("p");
    p.innerHTML="<b>You:</b> "+input.value;
    box.appendChild(p);

    input.value="";
    box.scrollTop=box.scrollHeight;
}
</script>

</body>
</html>
