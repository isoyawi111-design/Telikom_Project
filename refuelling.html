<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telikom PNG | Refuelling System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0057b8, #00a2ff);
    color: white;
}

/* HEADER (LOGIN STYLE) */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-left img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: white;
    padding: 4px;
}

.header-right {
    display: flex;
    gap: 10px;
}

.btn {
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    color: white;
}

.back-btn { background: #00b894; }
.logout-btn { background: #d00000; }

/* MAIN */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 25px 20px 80px;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    padding: 25px;
}

/* FORM */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
}

input, select, textarea {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

textarea { min-height: 80px; }

button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #003b73;
    color: white;
    cursor: pointer;
}

button:hover { background: #002855; }

.section-title {
    margin: 20px 0 10px;
}

/* IMAGES */
img {
    width: 100%;
    border-radius: 10px;
    margin-top: 8px;
}

/* FOOTER */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

video { display:none; width:100%; margin-top:10px; }
canvas { display:none; }

</style>
</head>

<body>

<script>
if (sessionStorage.getItem("loggedIn") !== "true") {
    window.location.href = "index.html";
}
</script>

<!-- HEADER -->
<header>
    <div class="header-left">
        <img src="logotpng.jfif">
        <div>
            <h3>Telikom PNG Refuelling</h3>
            <small id="user"></small>
        </div>
    </div>

    <div class="header-right">
        <button class="btn back-btn" onclick="window.location.href='engineerdashboard.html'">Dashboard</button>
        <button class="btn logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<!-- BODY -->
<div class="container">
<div class="card">

<h2 class="section-title">Site Information</h2>

<div class="form-grid">
<input id="engineer" placeholder="Engineer">
<input id="siteName" placeholder="Site Name">
<input id="siteId" placeholder="Site ID">
<input type="date" id="date">
<input type="time" id="time">
</div>

<h2 class="section-title">Region</h2>

<div class="form-grid">
<select id="region" onchange="updateProvinces()">
<option value="">Select Region</option>
<option>MomaseEHP</option>
<option>Highlands</option>
<option>Southern</option>
<option>NGI</option>
</select>

<select id="province"></select>
</div>

<h2 class="section-title">Fuel Data</h2>

<div class="form-grid">
<input id="before" placeholder="Fuel Before">
<input id="added" placeholder="Fuel Added">
<input id="after" placeholder="Fuel After">
</div>

<button onclick="calculate()">Calculate</button>
<div id="calc"></div>

<h2 class="section-title">Photos</h2>

<button onclick="openCamera('BEFORE')">Before Photo</button>
<img id="imgBefore">

<button onclick="openCamera('TOPUP')">TopUp Photo</button>
<img id="imgTopup">

<button onclick="openCamera('AFTER')">After Photo</button>
<img id="imgAfter">

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<h2 class="section-title">Submit</h2>
<button onclick="submitForm()">Submit Refuelling</button>

</div>
</div>

<!-- FOOTER -->
<footer>
Telikom PNG Ltd | Refuelling System | Powered by Iso Yawi
</footer>

<script>

document.getElementById("user").innerText =
sessionStorage.getItem("username") || "Engineer";

/* REGION */
function updateProvinces(){
let r = region.value;
let p = province;
let list = [];

if(r=="MomaseEHP") list=["Morobe","Madang","Sepik"];
if(r=="Highlands") list=["Simbu","Hela","Enga"];
if(r=="Southern") list=["Central","Gulf","Oro"];
if(r=="NGI") list=["ENB","WNB","New Ireland"];

p.innerHTML="";
list.forEach(x=>{
let o=document.createElement("option");
o.text=x;
p.appendChild(o);
});
}

/* CALC */
function calculate(){
let exp = (+before.value||0)+(+added.value||0);
let diff = (+after.value||0)-exp;
calc.innerText = "Expected: "+exp+" L | Diff: "+diff+" L";
}

/* CAMERA */
let stream, mode;

function openCamera(t){
mode=t;

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>{
stream=s;
video.srcObject=s;
video.style.display="block";
setTimeout(takePhoto,2000);
});
}

function takePhoto(){
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
let ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);

let label = mode+" PHOTO";
ctx.fillStyle="red";
ctx.fillText("Telikom PNG",20,30);
ctx.fillText(label,20,60);

let img = canvas.toDataURL("image/png");

if(mode=="BEFORE") imgBefore.src=img;
if(mode=="TOPUP") imgTopup.src=img;
if(mode=="AFTER") imgAfter.src=img;

stream.getTracks().forEach(t=>t.stop());
video.style.display="none";
}

/* SUBMIT */
function submitForm(){
if(!before.value||!added.value||!after.value||
!imgBefore.src||!imgTopup.src||!imgAfter.src){
alert("Fill all fields + photos");
return;
}
alert("Submitted Successfully");
}

/* LOGOUT */
function logout(){
sessionStorage.clear();
location.href="index.html";
}

</script>

</body>
</html>
