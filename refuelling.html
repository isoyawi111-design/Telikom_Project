<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telikom PNG | Engineer Projects</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0057b8, #00a2ff);
    color: white;
    display: flex;
    flex-direction: column;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-left img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: white;
    padding: 4px;
}

.header-right {
    display: flex;
    gap: 10px;
}

.btn {
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    color: white;
}

.back-btn {
    background: #00b894;
}

.logout-btn {
    background: #d00000;
}

/* Main */
.container {
    flex: 1;
    max-width: 1300px;
    width: 100%;
    margin: auto;
    padding: 30px 20px 90px;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.card h2 {
    margin-bottom: 20px;
}

/* Form */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
}

input,
select,
textarea {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
}

textarea {
    resize: vertical;
    min-height: 100px;
}

.action-btn {
    background: #003b73;
}

.action-btn:hover {
    background: #002855;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 25px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
}

th,
td {
    padding: 12px;
    text-align: left;
}

th {
    background: rgba(0,0,0,0.2);
}

tr:nth-child(even) {
    background: rgba(255,255,255,0.05);
}

.table-btn {
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    font-size: 12px;
    margin-right: 5px;
}

.edit-btn {
    background: #f39c12;
}

.delete-btn {
    background: #e74c3c;
}

.status-open {
    color: #ffe082;
    font-weight: 600;
}

.status-progress {
    color: #81ecec;
    font-weight: 600;
}

.status-completed {
    color: #b7ffb7;
    font-weight: 600;
}

.message {
    margin-top: 15px;
    font-weight: 500;
}

footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(12px);
}

@media (max-width: 768px) {
    header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }

    table {
        font-size: 12px;
    }
}
</style>
</head>
<body>

<script>
if (sessionStorage.getItem("loggedIn") !== "true") {
    window.location.href = "index.html";
}
</script>

<header>
    <div class="header-left">
        <img src="logotpng.jfif" alt="Telikom PNG Logo">
        <div>
            <h2>Refuelling Form</h2>
            <small id="currentUser"></small>
        </div>
    </div>

    <div class="header-right">
        <button class="btn back-btn" onclick="window.location.href='engineerdashboard.html'">
            Back to Dashboard
        </button>
        <button class="btn logout-btn" onclick="logout()">
            Logout
        </button>
    </div>
</header>

<h1>Telikom PNG Refuelling</h1>

<form id="fuelForm">

<!-- SITE INFO -->
<div class="row">
    <div class="form-group">
        <label>Field Engineer</label>
        <input id="engineer" required>
    </div>

    <div class="form-group">
        <label>Additional Team</label>
        <input id="team">
    </div>
</div>

<div class="row">
    <div class="form-group">
        <label>Date</label>
        <input type="date" id="date" required>
    </div>

    <div class="form-group">
        <label>Time</label>
        <input type="time" id="time" required>
    </div>
</div>

<div class="row">
    <div class="form-group">
        <label>Site Name</label>
        <input id="siteName" required>
    </div>

    <div class="form-group">
        <label>Site ID</label>
        <input id="siteId" required>
    </div>
</div>

<!-- REGION -->
<div class="row">
    <div class="form-group">
        <label>Region</label>
        <select id="region" onchange="updateProvinces()">
            <option value="">Select Region</option>
            <option value="MomaseEHP">Momase + EHP</option>
            <option value="Highlands">Highlands</option>
            <option value="Southern">Southern</option>
            <option value="NGI">New Guinea Islands</option>
        </select>
    </div>

    <div class="form-group">
        <label>Province</label>
        <select id="province">
            <option>Select Province</option>
        </select>
    </div>
</div>

<!-- TOWER -->
<div class="form-group">
    <label>Tower Height</label>
    <select id="tower">
        <option>23 Meter Monopole</option>
        <option>30M RDS</option>
        <option>45 M RDS</option>
        <option>45 M Grilliage</option>
        <option>45 M SST</option>
        <option>60 M RDS</option>
        <option>60 M Grilliage</option>
        <option>60 M SST</option>
        <option>80 M Grilliage</option>
        <option>80 M SST</option>
        <option>100 M SST</option>
        <option>110 M SST</option>
    </select>
</div>

<h2>Refuelling Details</h2>

<label>Genset (DG) Type</label>
<select id="genset">
    <option>Yanhan 8KVA</option>
    <option>Yanhan 17KVA</option>
    <option>Yanhan 24KVA</option>
    <option>CCTC 11KVA</option>
    <option>CCTC 17KVA</option>
    <option>CCTC 24KVA</option>
    <option>FG Wilson 15KVA</option>
    <option>Polar Power</option>
    <option>Sengen 15KVA</option>
</select>

<div class="row">
    <div class="form-group">
        <label>Engine Oil Level</label>
        <input type="number" id="oilLevel">
    </div>

    <div class="form-group">
        <label>Coolant Level</label>
        <input type="number" id="coolantLevel">
    </div>

    <div class="form-group">
        <label>Engine Speed (RPM)</label>
        <input type="number" id="rpm">
    </div>
</div>

<div class="row">
    <div class="form-group">
        <label>Fuel Before (L)</label>
        <input type="number" id="before">
    </div>
    <div class="form-group">
        <button type="button" onclick="openCamera('BEFORE')">Before Photo</button>
    </div>
</div>

<div class="row">
    <div class="form-group">
        <label>Fuel Top Up (L)</label>
        <input type="number" id="added">
    </div>
    <div class="form-group">
        <button type="button" onclick="openCamera('TOPUP')">Top-Up Photo</button>
    </div>
</div>

<div class="row">
    <div class="form-group">
        <label>Fuel After (L)</label>
        <input type="number" id="after">
    </div>
    <div class="form-group">
        <button type="button" onclick="openCamera('AFTER')">After Photo</button>
    </div>
</div>

<div id="calc">Expected: 0 L | Difference: 0 L</div>

<h2>Power</h2>

<div class="row">
    <div class="form-group">
        <label>PPL Connected?</label>
        <select id="ppl" onchange="togglePPL()">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
        </select>
    </div>

    <div class="form-group" id="pplFields" style="display:none;">
        <input placeholder="Meter Number" id="meter">
        <input placeholder="Reading" id="reading">
    </div>
</div>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<h3>Before Refuelling Photo</h3>
<img id="imgBefore">
<button type="button" onclick="resetPhoto('BEFORE')">Reset Before Photo</button>

<h3>Top-Up Photo</h3>
<img id="imgTopup">
<button type="button" onclick="resetPhoto('TOPUP')">Reset Top-Up Photo</button>

<h3>After Refuelling Photo</h3>
<img id="imgAfter">
<button type="button" onclick="resetPhoto('AFTER')">Reset After Photo</button>

<h2>Driver Details</h2>
<input id="driverName" placeholder="Driver Name">
<input id="vehicleReg" placeholder="Vehicle Registration">
<textarea id="comments" placeholder="Comments"></textarea>

<div class="row">
    <div class="form-group">
        <button type="submit">Submit Refuelling Record</button>
    </div>

    <div class="form-group">
        <button type="button" onclick="logout()">Logout</button>
    </div>
</div>

</form>

<div class="footer">
    Powered by Iso Yawi | System Creator
</div>

</div>

<script>
/* Set current date and time */
window.onload = function() {
    const now = new Date();
    document.getElementById("date").value = now.toISOString().split("T")[0];
    document.getElementById("time").value = now.toTimeString().slice(0, 5);
};

/* PPL Toggle */
function togglePPL() {
    document.getElementById("pplFields").style.display =
        document.getElementById("ppl").value === "Yes" ? "block" : "none";
}

/* Camera */
let stream;
let mode = "";

function openCamera(type) {
    if (!siteName.value || !siteId.value || !engineer.value) {
        alert("Enter Site Name, Site ID and Engineer first.");
        return;
    }

    mode = type;

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    })
    .then(s => {
        stream = s;
        video.srcObject = s;
        video.style.display = "block";
        setTimeout(capture, 2000);
    })
    .catch(() => {
        alert("Unable to access camera.");
    });
}

function capture() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const label = {
        BEFORE: "BEFORE REFUELLING",
        TOPUP: "REFUELLING IN PROGRESS",
        AFTER: "AFTER REFUELLING"
    }[mode];

    ctx.fillStyle = "red";
    ctx.font = "18px Arial";
    ctx.fillText("Telikom PNG", 20, 30);
    ctx.fillText(label, 20, 60);
    ctx.fillText(new Date().toLocaleString(), 20, 90);
    ctx.fillText(siteName.value + " | " + siteId.value, 20, 120);

    const img = canvas.toDataURL("image/png");

    if (mode === "BEFORE") imgBefore.src = img;
    if (mode === "TOPUP") imgTopup.src = img;
    if (mode === "AFTER") imgAfter.src = img;

    stream.getTracks().forEach(t => t.stop());
    video.style.display = "none";
}

/* Reset Photo */
function resetPhoto(type) {
    if (type === "BEFORE") imgBefore.src = "";
    if (type === "TOPUP") imgTopup.src = "";
    if (type === "AFTER") imgAfter.src = "";
}

/* Calculation */
function calculate() {
    const expected = (+before.value || 0) + (+added.value || 0);
    const diff = (+after.value || 0) - expected;
    calc.innerHTML = `Expected: ${expected} L | Difference: ${diff} L`;
}

before.oninput = calculate;
added.oninput = calculate;
after.oninput = calculate;

/* Province Update */
function updateProvinces() {
    const region = document.getElementById("region").value;
    const province = document.getElementById("province");

    let list = [];

    if (region === "MomaseEHP") {
        list = ["Morobe", "Madang", "East Sepik", "Sandaun", "Eastern Highlands"];
    }

    if (region === "Highlands") {
        list = ["Simbu", "Western Highlands", "Enga", "Southern Highlands", "Hela", "Jiwaka"];
    }

    if (region === "Southern") {
        list = ["Central", "Gulf", "Oro", "Milne Bay", "Western", "NCD"];
    }

    if (region === "NGI") {
        list = ["East New Britain", "West New Britain", "New Ireland", "Bougainville"];
    }

    province.innerHTML = "<option>Select Province</option>";

    list.forEach(p => {
        const opt = document.createElement("option");
        opt.text = p;
        opt.value = p;
        province.appendChild(opt);
    });
}

/* Submit Validation */
fuelForm.onsubmit = function(e) {
    e.preventDefault();

    if (!before.value || !added.value || !after.value ||
        !imgBefore.src || !imgTopup.src || !imgAfter.src) {
        alert("Please fill all required fields and capture all photos.");
        return;
    }

    alert("Refuelling record submitted successfully.");
};

/* Logout */
function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}
</script>

</body>
</html>
