<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telikom PNG | Network Transmission Audit</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0057b8,#00a2ff);
    color:white;
    min-height:100vh;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
    position:sticky;
    top:0;
    z-index:1000;
}

.header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.header-left img{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    padding:4px;
}

.btn{
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    color:white;
}

.back-btn{background:#00b894;}
.save-btn{background:#003b73;}
.logout-btn{background:#d00000;}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:25px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.field{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
}

textarea{
    min-height:120px;
}

footer{
    text-align:center;
    padding:15px;
    background:rgba(0,0,0,0.35);
    margin-top:20px;
}

@media(max-width:768px){
header{
    flex-direction:column;
    gap:15px;
    text-align:center;
}
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem('loggedIn')!=='true'){
    window.location.href='index.html';
}
</script>

<header>
    <div class="header-left">
        <img src="logotpng.jfif" alt="Telikom PNG">

        <div>
            <h2>Network Transmission Audit</h2>
            <small id="auditUser">
                Fiber • Microwave • VSAT Transmission
            </small>
        </div>
    </div>

    <div class="actions">
        <button class="btn back-btn"
        onclick="window.location.href='engineerdashboard.html'">
        Dashboard
        </button>

        <button class="btn save-btn"
        onclick="saveTransmissionAudit()">
        Save Audit
        </button>

        <button class="btn logout-btn"
        onclick="logout()">
        Logout
        </button>
    </div>
</header>

<div class="container">

<div class="card">
<h2>Transmission Site Information</h2>

<div class="form-grid">

<div class="field">
<label>Province</label>
<input type="text">
</div>

<div class="field">
<label>Site Name</label>
<input type="text">
</div>

<div class="field">
<label>Site Code</label>
<input type="text">
</div>

<div class="field">
<label>Transmission Type</label>
<select>
<option>Fiber Optic</option>
<option>Microwave (MW)</option>
<option>VSAT</option>
<option>Hybrid</option>
</select>
</div>

</div>
</div>

<div class="card">
<h2>Fiber Optic Audit</h2>

<div class="form-grid">

<div class="field">
<label>Fiber Route Name</label>
<input type="text">
</div>

<div class="field">
<label>Fiber Core Utilization</label>
<input type="text">
</div>

<div class="field">
<label>OTDR Test Conducted</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>Fiber Loss (dB)</label>
<input type="number">
</div>

</div>
</div>

<div class="card">
<h2>Microwave (MW) Audit</h2>

<div class="form-grid">

<div class="field">
<label>Link Name</label>
<input type="text">
</div>

<div class="field">
<label>Frequency Band</label>
<input type="text">
</div>

<div class="field">
<label>Signal Level (dBm)</label>
<input type="number">
</div>

<div class="field">
<label>Alarm Status</label>
<select>
<option>No Alarm</option>
<option>Minor Alarm</option>
<option>Major Alarm</option>
<option>Critical Alarm</option>
</select>
</div>

</div>
</div>

<div class="card">
<h2>VSAT Audit</h2>

<div class="form-grid">

<div class="field">
<label>Satellite Provider</label>
<input type="text">
</div>

<div class="field">
<label>Dish Size</label>
<input type="text">
</div>

<div class="field">
<label>Rx Signal Level</label>
<input type="text">
</div>

<div class="field">
<label>Tx Signal Level</label>
<input type="text">
</div>

</div>
</div>

<div class="card">
<h2>Transmission Performance</h2>

<div class="form-grid">

<div class="field">
<label>Bandwidth Capacity (Mbps)</label>
<input type="number">
</div>

<div class="field">
<label>Current Utilization (%)</label>
<input type="number">
</div>

<div class="field">
<label>Latency (ms)</label>
<input type="number">
</div>

<div class="field">
<label>Packet Loss (%)</label>
<input type="number">
</div>

</div>
</div>

<div class="card">
<h2>Findings & Recommendations</h2>

<div class="field">
<label>Audit Findings</label>
<textarea></textarea>
</div>

<div class="field">
<label>Corrective Actions</label>
<textarea></textarea>
</div>

<div class="field">
<label>Engineer Remarks</label>
<textarea></textarea>
</div>

</div>

</div>

<footer>
    Powered By: <strong>Iso Yawi | System Creator</strong>
</footer>

<script>
const loggedUser =
sessionStorage.getItem("username") || "Engineer";

document.getElementById("auditUser").innerHTML =
"Engineer: " + loggedUser;

function saveTransmissionAudit(){
    alert("Transmission Audit Saved Successfully!");
}

function logout(){
    sessionStorage.clear();
    window.location.href="index.html";
}
</script>

</body>
</html>
