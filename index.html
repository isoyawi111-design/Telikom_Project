<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telikom PNG Ltd | Login Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0057b8, #00a2ff);
    padding: 20px;
}

.login-container {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    overflow: hidden;
}

.login-header {
    text-align: center;
    padding: 30px 25px 20px;
    color: #fff;
}

.login-header img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    background: #fff;
    padding: 8px;
    border-radius: 50%;
    margin-bottom: 15px;
}

.login-header h1 {
    font-size: 28px;
    font-weight: 700;
}

.login-header p {
    font-size: 14px;
    opacity: 0.9;
}

.login-body {
    padding: 20px 30px 30px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    color: #fff;
    font-weight: 600;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 15px;
}

.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #0077b6;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #005f8f;
}

.forgot-password {
    text-align: center;
    margin-top: 12px;
}

.forgot-password a {
    color: #fff;
    font-size: 13px;
    text-decoration: none;
}

.forgot-password a:hover {
    text-decoration: underline;
}

.message {
    margin-top: 10px;
    text-align: center;
    font-size: 14px;
    color: #fff;
}

.login-footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: #fff;
    background: rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="login-container">

    <!-- HEADER -->
    <div class="login-header">
        <img src="logotpng.jfif" alt="Telikom Logo">
        <h1>Telikom PNG Ltd</h1>
        <p>Secure Login Platform</p>
    </div>

    <!-- LOGIN FORM -->
    <div class="login-body">

        <form id="loginForm">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter Username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="forgot-password">
                <a href="#" onclick="alert('Contact Admin for password reset'); return false;">
                    Forgot Password?
                </a>
            </div>

            <div class="message" id="message"></div>

        </form>

    </div>

    <!-- FOOTER -->
    <div class="login-footer">
        Powered By: <strong>Iso Yawi | System Creator</strong>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // =====================================================
    // INITIALIZE DEFAULT ADMIN ACCOUNT
    // =====================================================
    let users = JSON.parse(localStorage.getItem("engineerAccounts")) || [];

    // Check if Admin account exists
    const adminExists = users.some(
        user => user.username === "Admin"
    );

    // Create default Admin if missing
    if (!adminExists) {
        users.push({
            username: "Admin",
            password: "Admin123",
            role: "Administrator"
        });

        localStorage.setItem(
            "engineerAccounts",
            JSON.stringify(users)
        );
    }

    // =====================================================
    // LOGIN FORM ELEMENTS
    // =====================================================
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    // If login form does not exist, stop script
    if (!loginForm) return;

    // =====================================================
    // LOGIN EVENT
    // =====================================================
    loginForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const username = document
            .getElementById("username")
            .value
            .trim();

        const password = document
            .getElementById("password")
            .value
            .trim();

        // Reload latest users from localStorage
        const accounts = JSON.parse(
            localStorage.getItem("engineerAccounts")
        ) || [];

        // Find matching account
        const user = accounts.find(account =>
            account.username === username &&
            account.password === password
        );

        // =================================================
        // SUCCESSFUL LOGIN
        // =================================================
       if (user) {

    // Save session info
    sessionStorage.setItem("loggedIn", "true");
    sessionStorage.setItem("username", user.username);
    sessionStorage.setItem("role", user.role);

    // Show success message
    if (message) {
        message.className = "message success";
        message.textContent = "Login successful...";
    }

    // Redirect based on role
    setTimeout(() => {
        if (user.role === "Administrator") {
            // Admin goes to admin dashboard
            window.location.href = "Admindashboard.html";
        } else {
            // Engineers go to engineer dashboard
            window.location.href = "engineerdashboard.html";
        }
    }, 800);

} else {

    // Invalid login
    if (message) {
        message.className = "message error";
        message.textContent = "Invalid username or password.";
    }
}

    // =====================================================
    // AUTO REDIRECT IF ALREADY LOGGED IN
    // =====================================================
    if (sessionStorage.getItem("loggedIn") === "true") {
        const role = sessionStorage.getItem("role");

        if (role === "Administrator") {
            window.location.href = "Admindashboard.html";
        } else {
            window.location.href = "engineerdashboard.html";
        }
    }
});
</script>
</body>
</html>
