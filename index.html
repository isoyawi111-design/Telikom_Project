<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telikom PNG Ltd | Login Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0057a3, #0099cc);
    padding: 20px;
}

.login-container {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.30);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    overflow: hidden;
}

.login-header {
    background: #003b73;
    color: #fff;
    text-align: center;
    padding: 30px 20px;
}

.login-header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
}

.login-header p {
    font-size: 14px;
    opacity: 0.9;
}

.login-body {
    padding: 35px 30px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: 0.3s;
}

.form-group input:focus {
    border-color: #0077b6;
    box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.15);
}

.login-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #0077b6;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #005f8f;
}

.message {
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
}

.message.success {
    color: #008000;
}

.message.error {
    color: #d00000;
}

.login-footer {
    background: #f5f5f5;
    text-align: center;
    padding: 15px 20px;
    font-size: 13px;
    color: #555;
    border-top: 1px solid #e0e0e0;
}

.login-footer strong {
    color: #003b73;
}

.dashboard {
    display: none;
    padding: 40px 30px;
    text-align: center;
}

.dashboard h2 {
    color: #003b73;
    margin-bottom: 10px;
}

.dashboard p {
    color: #555;
    margin-bottom: 20px;
}

.logout-btn {
    display: inline-block;
    padding: 10px 25px;
    background: #d00000;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.logout-btn:hover {
    background: #a00000;
}
</style>
</head>
<body>

<div class="login-container">

    <div class="login-header">
        <img src="logo.jpg" alt="Telikom PNG Logo" style="width: 90px; height: 90px; object-fit: contain; background: #ffffff; padding: 8px; border-radius: 50%; margin: 0 auto 15px; display: block;">
        <h1>Telikom PNG Ltd</h1>
        <p>Secure Login Platform</p>
    </div>

    <div class="login-body" id="loginSection">
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <div class="dashboard" id="dashboard">
        <h2>Engineers Dashboard</h2>
        <p>Welcome, Admin. You have successfully logged into the Telikom PNG Ltd Engineering System.</p>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="login-footer">
        Powered By: <strong>Iso Yawi | System Creator</strong>
    </div>

</div>

<script>
const VALID_USERNAME = 'Admin';
const VALID_PASSWORD = 'Admin';

const loginForm = document.getElementById('loginForm');
const message = document.getElementById('message');
const loginSection = document.getElementById('loginSection');
const dashboard = document.getElementById('dashboard');

loginForm.addEventListener('submit', function (e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (username === VALID_USERNAME && password === VALID_PASSWORD) {
        message.textContent = 'Login successful! Redirecting to Engineers Dashboard...';
        message.className = 'message success';

        setTimeout(() => {
            loginSection.style.display = 'none';
            dashboard.style.display = 'block';
        }, 800);
    } else {
        message.textContent = 'Invalid username or password.';
        message.className = 'message error';
    }
});

function logout() {
    dashboard.style.display = 'none';
    loginSection.style.display = 'block';
    loginForm.reset();
    message.textContent = '';
    message.className = 'message';
}
</script>

</body>
</html>

* **Username:** `Admin`
* **Password:** `Admin`
