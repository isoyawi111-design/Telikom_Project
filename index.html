<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telikom PNG | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0057b8,#00a2ff);
}

.login-box{
    width:380px;
    padding:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);
    border-radius:20px;
    text-align:center;
    color:#fff;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.login-box img{
    width:90px;
    background:#fff;
    border-radius:50%;
    padding:6px;
    margin-bottom:10px;
}

.login-box h2{
    margin-bottom:10px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#003b73;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.login-box button:hover{
    background:#00264d;
}

.note{
    margin-top:10px;
    font-size:13px;
    opacity:0.9;
}

.footer{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    padding:10px;
    background:rgba(0,0,0,0.2);
    color:#fff;
}
</style>
</head>

<body>

<div class="login-box">
    <img src="logotpng.jfif">
    <h2>Telikom PNG Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="note">
        Forgot password? Contact Admin
    </div>
</div>

<div class="footer">
    Powered By: Iso Yawi | System Creator
</div>

<script>

function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // ✅ CHECK LOGIN
    if(user === "Admin" && pass === "Admin"){

        // SAVE SESSION
        sessionStorage.setItem("loggedIn","true");

        // REDIRECT TO DASHBOARD
        window.location.href = "dashboard.html";

    } else {
        alert("Invalid Username or Password");
    }
}

// If already logged in, skip login page
if(sessionStorage.getItem("loggedIn") === "true"){
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
