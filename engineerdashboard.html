<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Telikom PNG | Engineers Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    background: linear-gradient(135deg,#0057b8,#00a2ff);
    min-height:100vh;
    color:white;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.left img{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    padding:4px;
}

.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.icon-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    background:white;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#0057b8;
}

.logout{
    background:#d00000;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* MAIN LAYOUT */
.main{
    flex:1;
    display:flex;
}

/* SIDEBAR LEFT */
.sidebar{
    width:260px;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(10px);
    padding:20px;
}

.sidebar h3{
    margin-bottom:15px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:rgba(255,255,255,0.15);
    color:white;
    text-align:left;
    transition:0.3s;
}

.menu button:hover{
    background:rgba(255,255,255,0.3);
}

/* CONTENT AREA */
.content{
    flex:1;
    padding:25px;
}

/* CHAT POPUP */
.chat-popup{
    position:fixed;
    bottom:70px;
    right:20px;
    width:320px;
    height:420px;
    background:white;
    color:black;
    border-radius:12px;
    display:none;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.chat-header{
    background:#0057b8;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

.chat-box{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.chat-input{
    display:flex;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    border-top:1px solid #ddd;
}

.chat-input button{
    padding:10px;
    background:#0057b8;
    color:white;
    border:none;
}

/* FOOTER FIXED */
footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:12px;
    text-align:center;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(12px);
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("loggedIn") !== "true"){
    window.location.href="index.html";
}
</script>

<!-- HEADER -->
<header>
    <div class="left">
        <img src="logotpng.jfif">
        <h3>Engineers Dashboard</h3>
    </div>

    <div class="right">
        <div class="icon-btn" onclick="toggleChat()">💬</div>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
</header>

<!-- MAIN -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Systems</h3>

        <div class="menu">
           <button onclick="window.location.href='project.html'">Projects</button>
            <button onclick="window.location.href='networkhealthaudit.html'"> Network Health Audit</button>
            <button>Refueling</button>
            <button>Network Transmission</button>
            <button>Radio Frequency</button>
            <button>Base Station Systems</button>
            <button>Network Operations Center</button>
            <button>Core Access Network</button>
            <button>Network Infrastructure</button>
            <button>Centers</button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <h2>Welcome Engineer</h2>
        <p>Select a module from the left panel.</p>
    </div>

</div>


<!-- CHAT -->
<div class="chat-popup" id="chatPopup">

    <div class="chat-header">
        <span>LiveWire Chat</span>
        <button onclick="toggleChat()">X</button>
    </div>

    <div class="chat-box" id="chatBox">
        <p><b>System:</b> Connected</p>
    </div>

    <div class="chat-input">
        <input id="msg" placeholder="Message...">
        <button onclick="send()">Send</button>
    </div>
</div>

<!-- FOOTER -->
<footer>
    Powered By: Iso Yawi | System Creator
</footer>

<script>
// =====================================================
// ACCESS CONTROL
// =====================================================
if (sessionStorage.getItem("loggedIn") !== "true") {
    window.location.href = "index.html";
}

// =====================================================
// LOAD CURRENT USER
// =====================================================
const currentUsername = sessionStorage.getItem("username");
const currentRole = sessionStorage.getItem("role");

// If no username is found, return to login page
if (!currentUsername) {
    window.location.href = "index.html";
}

// =====================================================
// DISPLAY CURRENT USER IN HEADER
// Add this element in your HTML header if not present:
// <span id="currentUser"></span>
// =====================================================
document.addEventListener("DOMContentLoaded", function () {

    // Show logged in user name
    const currentUserEl = document.getElementById("currentUser");
    if (currentUserEl) {
        currentUserEl.textContent =
            currentUsername + " (" + currentRole + ")";
    }

    // Show Admin Panel button only for Administrators
    const adminBtn = document.getElementById("adminBtn");

    if (adminBtn) {
        if (currentRole === "Administrator") {
            adminBtn.style.display = "inline-block";
        } else {
            adminBtn.style.display = "none";
        }
    }
});

// =====================================================
// OPEN MODULE
// =====================================================
function openModule(moduleName) {
    alert(moduleName + " module will open here.");
}

// =====================================================
// LOGOUT
// =====================================================
function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
}

// =====================================================
// GO TO ADMIN DASHBOARD
// =====================================================
function openAdminPanel() {
    window.location.href = "Admindashboard.html";
}

// =====================================================
// LIVEWIRE CHAT
// =====================================================
function toggleChat() {
    const chat = document.getElementById("chatPopup");
    if (!chat) return;

    chat.style.display =
        chat.style.display === "flex" ? "none" : "flex";
}

function sendMessage() {
    const input = document.getElementById("chatInput");
    const chatBox = document.getElementById("chatBox");

    if (!input || !chatBox) return;

    const message = input.value.trim();
    if (message === "") return;

    const msgDiv = document.createElement("div");
    msgDiv.className = "chat-message";
    msgDiv.innerHTML =
        "<strong>" + currentUsername + ":</strong> " + message;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    input.value = "";
}

// Send on Enter key
document.addEventListener("DOMContentLoaded", function () {
    const chatInput = document.getElementById("chatInput");

    if (chatInput) {
        chatInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                sendMessage();
            }
        });
    }
});
</script>

</body>
</html>
