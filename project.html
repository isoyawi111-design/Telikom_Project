<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telikom PNG | Engineer Projects</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0057b8, #00a2ff);
    color: white;
    display: flex;
    flex-direction: column;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-left img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: white;
    padding: 4px;
}

.header-right {
    display: flex;
    gap: 10px;
}

.btn {
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    color: white;
}

.back-btn {
    background: #00b894;
}

.logout-btn {
    background: #d00000;
}

/* Main */
.container {
    flex: 1;
    max-width: 1300px;
    width: 100%;
    margin: auto;
    padding: 30px 20px 90px;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.card h2 {
    margin-bottom: 20px;
}

/* Form */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
}

input,
select,
textarea {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
}

textarea {
    resize: vertical;
    min-height: 100px;
}

.action-btn {
    background: #003b73;
}

.action-btn:hover {
    background: #002855;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 25px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
}

th,
td {
    padding: 12px;
    text-align: left;
}

th {
    background: rgba(0,0,0,0.2);
}

tr:nth-child(even) {
    background: rgba(255,255,255,0.05);
}

.table-btn {
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    font-size: 12px;
    margin-right: 5px;
}

.edit-btn {
    background: #f39c12;
}

.delete-btn {
    background: #e74c3c;
}

.status-open {
    color: #ffe082;
    font-weight: 600;
}

.status-progress {
    color: #81ecec;
    font-weight: 600;
}

.status-completed {
    color: #b7ffb7;
    font-weight: 600;
}

.message {
    margin-top: 15px;
    font-weight: 500;
}

footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(12px);
}

@media (max-width: 768px) {
    header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }

    table {
        font-size: 12px;
    }
}
</style>
</head>
<body>

<script>
if (sessionStorage.getItem("loggedIn") !== "true") {
    window.location.href = "index.html";
}
</script>

<header>
    <div class="header-left">
        <img src="logotpng.jfif" alt="Telikom PNG Logo">
        <div>
            <h2>Engineer Projects</h2>
            <small id="currentUser"></small>
        </div>
    </div>

    <div class="header-right">
        <button class="btn back-btn" onclick="window.location.href='engineerdashboard.html'">
            Back to Dashboard
        </button>
        <button class="btn logout-btn" onclick="logout()">
            Logout
        </button>
    </div>
</header>

<div class="container">

    <div class="card">
        <h2>Create New Project</h2>

        <div class="form-grid">
            <input type="text" id="projectTitle" placeholder="Project Title">
            <input type="text" id="projectLocation" placeholder="Location">
            <input type="date" id="startDate">
            <select id="projectStatus">
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
        </div>

        <textarea id="projectDescription" placeholder="Project Description"></textarea>

        <button class="btn action-btn" onclick="saveProject()">
            Save Project
        </button>

        <div class="message" id="message"></div>

        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Location</th>
                    <th>Start Date</th>
                    <th>Status</th>
                    <th>Engineer</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="projectsTableBody"></tbody>
        </table>
    </div>
</div>

<footer>
    Powered By: <strong>Iso Yawi | System Creator</strong>
</footer>

<script>
const currentUsername = sessionStorage.getItem("username") || "Unknown User";
const currentRole = sessionStorage.getItem("role") || "Engineer";

const currentUserEl = document.getElementById("currentUser");
if (currentUserEl) {
    currentUserEl.textContent = currentUsername + " (" + currentRole + ")";
}

let projects = JSON.parse(localStorage.getItem("telikomProjects")) || [];
let editIndex = -1;

function saveProjects() {
    localStorage.setItem("telikomProjects", JSON.stringify(projects));
}

function renderProjects() {
    const tbody = document.getElementById("projectsTableBody");
    tbody.innerHTML = "";

    if (projects.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center; opacity:0.8;">
                    No projects available.
                </td>
            </tr>
        `;
        return;
    }

    projects.forEach((project, index) => {
        let statusClass = "status-open";

        if (project.status === "In Progress") {
            statusClass = "status-progress";
        } else if (project.status === "Completed") {
            statusClass = "status-completed";
        }

        tbody.innerHTML += `
            <tr>
                <td>${project.title}</td>
                <td>${project.location}</td>
                <td>${project.startDate}</td>
                <td class="${statusClass}">${project.status}</td>
                <td>${project.engineer}</td>
                <td>
                    <button class="table-btn edit-btn" onclick="editProject(${index})">
                        Edit
                    </button>
                    <button class="table-btn delete-btn" onclick="deleteProject(${index})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });
}

function saveProject() {
    const title = document.getElementById("projectTitle").value.trim();
    const location = document.getElementById("projectLocation").value.trim();
    const startDate = document.getElementById("startDate").value;
    const status = document.getElementById("projectStatus").value;
    const description = document.getElementById("projectDescription").value.trim();
    const message = document.getElementById("message");

    if (!title || !location || !startDate) {
        message.style.color = "#ffd6d6";
        message.textContent = "Please fill in all required fields.";
        return;
    }

    const projectData = {
        title,
        location,
        startDate,
        status,
        description,
        engineer: currentUsername,
        createdAt: new Date().toISOString()
    };

    if (editIndex === -1) {
        projects.push(projectData);
        message.textContent = "Project created successfully.";
    } else {
        projects[editIndex] = {
            ...projects[editIndex],
            ...projectData
        };
        message.textContent = "Project updated successfully.";
        editIndex = -1;
    }

    message.style.color = "#b7ffb7";

    saveProjects();
    renderProjects();
    clearForm();
}

function editProject(index) {
    const project = projects[index];

    document.getElementById("projectTitle").value = project.title;
    document.getElementById("projectLocation").value = project.location;
    document.getElementById("startDate").value = project.startDate;
    document.getElementById("projectStatus").value = project.status;
    document.getElementById("projectDescription").value = project.description || "";

    editIndex = index;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteProject(index) {
    if (confirm("Delete project: " + projects[index].title + "?")) {
        projects.splice(index, 1);
        saveProjects();
        renderProjects();
    }
}

function clearForm() {
    document.getElementById("projectTitle").value = "";
    document.getElementById("projectLocation").value = "";
    document.getElementById("startDate").value = "";
    document.getElementById("projectStatus").value = "Open";
    document.getElementById("projectDescription").value = "";
}

function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
}

renderProjects();
</script>

</body>
</html>
